<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANEL AIMLOCK TARRGET</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #00ffe0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 320px;
    border: 2px solid #00ffe0;
    padding: 20px;
    box-shadow: 0 0 15px #00ffe0;
    position: relative;
}

.title {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

.option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 12px 0;
    color: #ffd700;
    font-size: 14px;
}

input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #00ffe0;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.btn {
    padding: 10px 15px;
    border: none;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.95);
}

.btn-max {
    background: red;
    box-shadow: 0 0 10px red;
}

.btn-smooth {
    background: #ff3333;
    box-shadow: 0 0 10px #ff3333;
}

/* Popup */
.popup {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    width: 260px;
    background: rgba(20,20,20,0.95);
    border: 2px solid #00ffe0;
    border-radius: 10px;
    padding: 15px;
    color: #00ffe0;
    font-size: 13px;
    box-shadow: 0 0 15px #00ffe0;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
}

.popup.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

/* Glow animation */
@keyframes glow {
    0% { box-shadow: 0 0 5px #00ffe0; }
    50% { box-shadow: 0 0 20px #00ffe0; }
    100% { box-shadow: 0 0 5px #00ffe0; }
}

.popup.show {
    animation: glow 1s infinite;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">PANEL AIMLOCK TARRGET</div>

    <div class="option">AIMLOCK<input type="checkbox"></div>
    <div class="option">AIMBOT<input type="checkbox"></div>
    <div class="option">FIX RUNG<input type="checkbox"></div>
    <div class="option">FIX LAG<input type="checkbox"></div>
    <div class="option">TỐI ƯU MÁY <input type="checkbox"></div>
    <div class="option">NHẸ TÂM<input type="checkbox"></div>

    <div class="buttons">
        <button class="btn btn-max" onclick="showPopup('MAX')">BUFF MAX</button>
        <button class="btn btn-smooth" onclick="showPopup('SMOOTH')">BUFF SMOOTH</button>
    </div>

    <div id="popup" class="popup"></div>
</div>

<script>
function showPopup(mode) {
    const popup = document.getElementById("popup");

    popup.innerHTML = `
        <b>Đã áp dụng chế độ: ${mode}</b><br><br>
        Cài đặt: AIMLOCK, AIMBOT,<br>
        FIX RUNG, FIX LAG,<br>
        TỐI ƯU MÁY, NHẸ TÂM
    `;

    popup.classList.add("show");

    // rung nhẹ (iPhone hỗ trợ)
    if (navigator.vibrate) {
        navigator.vibrate(50);
    }

    setTimeout(() => {
        popup.classList.remove("show");
    }, 2500);
}
</script>

</body>
</html>
